services:

  jupyter:
    build: .
    container_name: spark-jupyter
    ports:
      - "8888:8888"   # JupyterLab
      - "4040:4040"   # Spark UI
    volumes:
      - .:/app        # Mapeia todo o projeto para acesso ao .git e pacotes
      - ./.ivy2:/root/.ivy2
      - ~/.ssh:/root/.ssh:ro
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --allow-root
        --ServerApp.token=''
        --ServerApp.password=''
    restart: unless-stopped

  mkdocs:
    build: .
    container_name: spark-mkdocs
    ports:
      - "8000:8000"   # MKDocs preview
    volumes:
      - ./docs:/app/docs
      - ./mkdocs.yml:/app/mkdocs.yml
    command: mkdocs serve --dev-addr=0.0.0.0:8000
    restart: unless-stopped
