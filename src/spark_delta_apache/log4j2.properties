# Configuração para Silêncio Total no Spark
rootLogger.level = OFF

appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %p %c{1}: %m%n

rootLogger.appenderRef.console.ref = console

# Silenciar pacotes específicos
logger.spark.name = org.apache.spark
logger.spark.level = OFF
logger.delta.name = io.delta
logger.delta.level = OFF
logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = OFF
logger.ivy.name = org.apache.ivy
logger.ivy.level = OFF
